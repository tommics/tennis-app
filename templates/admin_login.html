{% extends "base.html" %}
{% block title %}Admin-Login{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div style="width:52px;height:52px;background:#0f172a;border-radius:14px;
                  display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <i class="bi bi-shield-lock-fill" style="color:#4ade80;font-size:1.4rem"></i>
      </div>
      <h4 class="fw-700 mb-1" style="font-weight:700">Admin-Bereich</h4>
      <p class="text-muted" style="font-size:.875rem">Passwort eingeben, um fortzufahren</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        {% if fehler %}
          <div class="alert alert-danger d-flex align-items-center gap-2 py-2" style="font-size:.875rem;border-radius:8px">
            <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>{{ fehler }}
          </div>
        {% endif %}
        <form method="post">
          <div class="mb-4">
            <label for="passwort" class="form-label fw-semibold" style="font-size:.875rem">Passwort</label>
            <input type="password" class="form-control" id="passwort" name="passwort"
                   autofocus required style="border-radius:8px;border-color:#cbd5e1">
          </div>
          <button type="submit" class="btn btn-brand w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>Anmelden
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
