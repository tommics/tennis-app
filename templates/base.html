<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis U11 – {% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --color-home:    #16a34a;
      --color-home-bg: #dcfce7;
      --color-home-tx: #15803d;
      --color-away:    #d97706;
      --color-away-bg: #fef3c7;
      --color-away-tx: #b45309;
      --color-bd1:     #1e40af;
      --color-bd1-bg:  #dbeafe;
      --color-bd1-tx:  #1e40af;
      --color-bd2:     #0f766e;
      --color-bd2-bg:  #ccfbf1;
      --color-bd2-tx:  #0f766e;
      --bg-page:       #f1f5f9;
      --text-base:     #1e293b;
      --text-muted:    #64748b;
      --card-radius:   14px;
    }

    body {
      background: var(--bg-page);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-base);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Navbar ── */
    .navbar { background: #0f172a !important; border-bottom: 1px solid #1e293b; }
    .navbar-brand { font-weight: 700; font-size: 1.05rem; letter-spacing: .3px; color: #fff !important; }
    .navbar-brand .brand-accent { color: #4ade80; }
    .nav-link { color: rgba(255,255,255,.65) !important; font-size: .875rem; font-weight: 500;
                padding: .4rem .75rem !important; border-radius: 6px; transition: all .15s; }
    .nav-link:hover { color: #fff !important; background: rgba(255,255,255,.08); }
    .navbar-toggler { border-color: rgba(255,255,255,.2); }

    /* ── Cards ── */
    .card { border: 1px solid #e2e8f0; border-radius: var(--card-radius); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .card-header { border-radius: calc(var(--card-radius) - 1px) calc(var(--card-radius) - 1px) 0 0 !important;
                   border-bottom: none; padding: .9rem 1.25rem; font-weight: 600; }
    .card-header.hdr-bd1    { background: var(--color-bd1); color: #fff; }
    .card-header.hdr-bd2    { background: var(--color-bd2); color: #fff; }
    .card-header.hdr-admin  { background: #1e293b; color: #fff; }
    .card-header.hdr-neutral{ background: #f8fafc; color: var(--text-base); border-bottom: 1px solid #e2e8f0 !important; }

    /* ── Chips (home/away/team) ── */
    .chip { display: inline-flex; align-items: center; gap: 4px;
            font-size: .7rem; font-weight: 600; padding: 2px 8px;
            border-radius: 999px; white-space: nowrap; }
    .chip-home { background: var(--color-home-bg); color: var(--color-home-tx); }
    .chip-away { background: var(--color-away-bg); color: var(--color-away-tx); }
    .chip-bd1  { background: var(--color-bd1-bg);  color: var(--color-bd1-tx); }
    .chip-bd2  { background: var(--color-bd2-bg);  color: var(--color-bd2-tx); }

    /* ── Buttons ── */
    .btn { border-radius: 8px; font-weight: 500; font-size: .875rem; }
    .btn-brand { background: var(--color-home); border-color: var(--color-home); color: #fff; }
    .btn-brand:hover { background: #15803d; border-color: #15803d; color: #fff; }

    /* ── Table ── */
    .table th { font-size: .72rem; font-weight: 600; text-transform: uppercase;
                letter-spacing: .5px; color: var(--text-muted); }
    .table-card { border-radius: var(--card-radius); overflow: hidden;
                  border: 1px solid #e2e8f0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }

    /* ── List items ── */
    .list-group-item { border-color: #e2e8f0; }
    .list-group-flush .list-group-item:first-child { border-top: none; }
    .list-group-flush .list-group-item:last-child  { border-bottom: none; }

    /* ── Form switch ── */
    .form-switch .form-check-input { width: 2.5em; height: 1.3em; cursor: pointer; margin-top: .1em; }
    .form-switch .form-check-input:checked { background-color: var(--color-home); border-color: var(--color-home); }

    /* ── Page section title ── */
    .page-title { font-size: 1.5rem; font-weight: 700; color: var(--text-base); }

    /* ── Status pill ── */
    .status-open   { background: #dcfce7; color: #15803d; padding: 3px 12px; border-radius: 999px; font-size: .8rem; font-weight: 600; }
    .status-locked { background: #fee2e2; color: #b91c1c; padding: 3px 12px; border-radius: 999px; font-size: .8rem; font-weight: 600; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">
        <i class="bi bi-bullseye me-2" style="color:#4ade80;font-size:1.1rem"></i>Tennis <span class="brand-accent">U11</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto gap-1 align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="/verfuegbarkeit"><i class="bi bi-calendar-check me-1"></i>Verfügbarkeit</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/uebersicht"><i class="bi bi-grid-3x3-gap me-1"></i>Übersicht</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/aufstellung"><i class="bi bi-people me-1"></i>Aufstellung</a>
          </li>
          {% if session.get('admin') %}
            <li class="nav-item">
              <a class="nav-link" href="/admin"><i class="bi bi-sliders me-1"></i>Admin</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin/logout"><i class="bi bi-box-arrow-right me-1"></i>Abmelden</a>
            </li>
          {% else %}
            <li class="nav-item">
              <a class="nav-link" href="/admin/login"><i class="bi bi-lock me-1"></i>Admin</a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
